<!DOCTYPE html>
<html>
<head>
<title>Table Booking - Rajwada Restaurant</title>

<style>
body{
    font-family: Arial;
    margin:0;
    text-align:center;
}

/* Header */
header{
    background:#8b0000;
    color:white;
    padding:20px;
}

/* Form box */
.form-box{
    width:350px;
    margin:30px auto;
    padding:20px;
    box-shadow:0 0 10px gray;
    border-radius:10px;
}

/* Inputs */
input, select{
    width:90%;
    padding:8px;
    margin:8px;
}

/* Button */
button{
    background:#8b0000;
    color:white;
    padding:10px 20px;
    border:none;
    border-radius:5px;
}

/* Navigation */
.page-nav a{
    background:#8b0000;
    color:white;
    padding:8px 15px;
    text-decoration:none;
    border-radius:5px;
    margin:10px;
}
</style>

</head>

<body>

<header>
<h1>Rajwada Family Restaurant</h1>
</header>

<h2>Book Your Table</h2>

<div class="form-box">

<form>

<input type="text" placeholder="Enter Name" required><br>

<input type="tel" placeholder="Mobile Number" required><br>

<input type="date" required><br>

<input type="time" required><br>

<select>
<option>Select Persons</option>
<option>1-2</option>
<option>3-4</option>
<option>5-6</option>
<option>7-10</option>
<option>10+</option>
</select><br>

<button type="submit">Book Table</button>

</form>

</div>

<br>

<div class="page-nav">
<a href="contact.html">Next ➡</a>
<a href="RAJWADA.html" class="btn">🏠 Home</a>

</div>

</body>
</html>
