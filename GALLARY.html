<!DOCTYPE html>
<html>
<head>
<title>Rajwada Family Restaurant - Gallery</title>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right,#f5f5f5,#e6e6e6);
}

/* Header */

.header{
    background:#b30000;
    color:white;
    text-align:center;
    padding:20px;
    font-size:28px;
    font-weight:bold;
    letter-spacing:1px;
}

/* Title */

.title{
    text-align:center;
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
}

/* Gallery Layout */

.gallery{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
    padding:40px;
}

/* Card */

.card{
    background:white;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    text-align:center;
    overflow:hidden;
    transition:0.4s;
}

/* Image */

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
    transition:0.4s;
}

/* Hover Effect */

.card:hover{
    transform:translateY(-8px);
}

.card:hover img{
    transform:scale(1.1);
}

/* Caption */

.caption{
    padding:10px;
    font-weight:bold;
    color:#0033cc;
}

/* Button */

.button{
    display:block;
    margin:20px auto 40px auto;
    background:#b30000;
    color:white;
    padding:10px 25px;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.button:hover{
    background:#800000;
    transform:scale(1.05);
}

</style>
</head>

<body>

<div class="header">
Rajwada Family Restaurant
</div>

<div class="title">
Our Hotel Gallery
</div>

<div class="gallery">

<div class="card">
<img src="https://tse3.mm.bing.net/th/id/OIP.NU1FMFg9MHYe_IxWc5L0pQHaE4?pid=Api&P=0&h=180">
<div class="caption">Rajwada</div>
</div>

<div class="card">
<img src="https://tse3.mm.bing.net/th/id/OIP.6KG6-GxawByQWFEABw4ZywHaE8?pid=Api&P=0&h=180">
<div class="caption">Birthday Party</div>
</div>

<div class="card">
<img src="https://tse1.mm.bing.net/th/id/OIP.5rdiS2Yu9OVTjAPZnqqQYAHaFj?pid=Api&P=0&h=180">
<div class="caption">Garden Area</div>
</div>

<div class="card">
<img src="https://tse4.mm.bing.net/th/id/OIP.uhuabPtigRBfJUsO3ix2mQHaHp?pid=Api&P=0&h=180">
<div class="caption">Hotel Front View</div>
</div>

<div class="card">
<img src="https://tse1.mm.bing.net/th/id/OIP.nPOnrFyCBXfUOvSBx8oBZgHaE8?pid=Api&P=0&h=180">
<div class="caption">Restaurant Interior</div>
</div>

<div class="card">
<img src="https://tse2.mm.bing.net/th/id/OIP.-ktmrazCFFub7_frQEFvGgHaE7?pid=Api&P=0&h=180">
<div class="caption">Family Hall</div>
</div>

</div>

<button class="button">Next ➜</button>

</body>
</html>
